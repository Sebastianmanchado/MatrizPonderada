spring.application.name=evaluador

# =====================================================================
# Carga opcional de .env (formato properties: KEY=valor).
# Se busca primero en el CWD (cuando corrés "mvn spring-boot:run" desde
# la raíz del repo) y después un nivel arriba (cuando corrés desde
# "backend/"). En el entorno de despliegue no existe ningún .env y las
# variables vienen del entorno del contenedor: el "optional:" evita que falle.
# =====================================================================
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties]

# =====================================================================
# Datasource (SQL Server en somee.com, o local).
# Las variables vienen del entorno / .env (ver .env.example).
# =====================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate gestiona el schema (Flyway desactivado).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

# =====================================================================
# Servidor + CORS
# =====================================================================
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

frontend.url=${FRONTEND_URL:http://localhost:5173}

# =====================================================================
# Config alternativa con PostgreSQL (descomentar si volvés a PG).
# Hace falta también: sacar mssql-jdbc del pom y agregar org.postgresql:postgresql.
# =====================================================================
# spring.datasource.driver-class-name=org.postgresql.Driver
