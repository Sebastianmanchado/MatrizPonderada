spring.application.name=evaluador

# =====================================================================
# Carga opcional de .env (formato properties: KEY=valor).
# Se busca primero en el CWD (cuando corrés "mvn spring-boot:run" desde
# la raíz del repo) y después un nivel arriba (cuando corrés desde
# "backend/"). En Render no existe ningún .env y las variables vienen
# del entorno del contenedor: el "optional:" evita que falle.
# =====================================================================
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties]

# =====================================================================
# Datasource (PostgreSQL en Neon, Render, etc.)
# Las variables vienen del entorno. Local: usar .env (ver .env.example).
# =====================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate gestiona el schema (Flyway desactivado en este despliegue).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

# =====================================================================
# Servidor + CORS (Render setea PORT automáticamente)
# =====================================================================
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

frontend.url=${FRONTEND_URL:http://localhost:3000}

