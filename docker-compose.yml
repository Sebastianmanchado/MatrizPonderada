services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: evaluador-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Evaluador#2026"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: evaluador-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'Evaluador#2026' -C -Q
      \"IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = 'EvaluadorIA')
      CREATE DATABASE EvaluadorIA;\"
      "
    restart: "no"

volumes:
  mssql-data:
